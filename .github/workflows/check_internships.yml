name: Internship Checker

on:
  schedule:
    - cron: '7,22,37,52 * * * *'   # Every ~15 min at staggered offsets
  workflow_dispatch:           # Also allows manual trigger from GitHub UI
    inputs:
      send_test_ping:
        description: "Send a Telegram test message during this run"
        required: false
        default: 'false'

concurrency:
  group: internship-checker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state file (cross-run cache)
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: internship-state-v3-${{ github.run_id }}
          restore-keys: |
            internship-state-v3-

      - name: Run internship checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TEST_PING: ${{ github.event.inputs.send_test_ping }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 main.py

      - name: Save updated state file
        uses: actions/cache/save@v4
        if: always()   # Save even if a source fails so state isn't lost
        with:
          path: state.json
          key: internship-state-v3-${{ github.run_id }}
